apiVersion: v1
kind: Pod

metadata:
  name: nginx-pod1
  namespace: default

spec:
  containers:
    - name: nginx
      image: nginx:latest

      volumeMounts:
        - name: my-volume
          mountPath: /usr/share/nginx/html

  volumes:
    - name: my-volume
      persistentVolumeClaim:
        claimName: dynamic-pvc